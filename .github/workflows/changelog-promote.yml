# Reusable workflow: promote [Unreleased] entries and auto-resolve PR conflicts
# Translated from AzDO pipeline (claude-changelog-promote, definition 1207)
#
# Auth modes (in priority order):
#   1. GitHub App token: pass app_id + app_private_key secrets
#   2. PAT/custom token: pass push_token secret
#   3. GITHUB_TOKEN fallback: pass nothing (public repos with no branch protection only)
#
# Caller requirements:
#   - permissions: { contents: write, pull-requests: read } on the calling job
#   - secrets.* cannot be used in step `if` conditions (GitHub validation bug)
name: Changelog Promote

on:
  workflow_call:
    inputs:
      trigger_sha:
        description: 'The commit SHA that landed on main'
        required: true
        type: string
      version:
        description: 'Version string (defaults to YYYYMMDD.run_number)'
        required: false
        type: string
        default: ''
      scripts_repo:
        description: 'Repository containing promotion scripts'
        required: false
        type: string
        default: 'jeigenjjk/changelog-promote-pipeline'
      scripts_ref:
        description: 'Ref to checkout from scripts repo'
        required: false
        type: string
        default: 'main'
    secrets:
      push_token:
        description: 'PAT for pushing to main and cross-repo checkout (falls back to GITHUB_TOKEN)'
        required: false
      app_id:
        description: 'GitHub App ID for token generation (preferred over push_token)'
        required: false
      app_private_key:
        description: 'GitHub App private key (PEM format)'
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    concurrency:
      group: changelog-promote-${{ github.repository }}
      cancel-in-progress: false

    steps:
      # --- Token generation ---
      # Detect which auth mode to use (secrets.* cannot be used in step if conditions)
      - name: Detect auth mode
        id: detect-auth
        shell: bash
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$PUSH_TOKEN" ]; then
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_ID: ${{ secrets.app_id }}
          APP_KEY: ${{ secrets.app_private_key }}
          PUSH_TOKEN: ${{ secrets.push_token }}

      # App token (preferred): scoped, short-lived, auditable
      - name: Generate App token
        if: steps.detect-auth.outputs.has_app == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      # Resolve the effective token: App token > push_token > GITHUB_TOKEN
      - name: Resolve auth token
        id: auth
        shell: bash
        run: |
          if [ "$HAS_APP" = "true" ] && [ -n "$APP_TOKEN" ]; then
            echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
            echo "mode=app" >> "$GITHUB_OUTPUT"
            echo "Auth mode: GitHub App"
          elif [ "$HAS_PAT" = "true" ]; then
            echo "token=$PUSH_TOKEN" >> "$GITHUB_OUTPUT"
            echo "mode=pat" >> "$GITHUB_OUTPUT"
            echo "Auth mode: PAT/custom token"
          else
            echo "token=$DEFAULT_TOKEN" >> "$GITHUB_OUTPUT"
            echo "mode=default" >> "$GITHUB_OUTPUT"
            echo "Auth mode: GITHUB_TOKEN (default)"
          fi
        env:
          HAS_APP: ${{ steps.detect-auth.outputs.has_app }}
          HAS_PAT: ${{ steps.detect-auth.outputs.has_pat }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PUSH_TOKEN: ${{ secrets.push_token }}
          DEFAULT_TOKEN: ${{ github.token }}

      # --- Checkout ---
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.auth.outputs.token }}

      - name: Checkout promotion scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.scripts_repo }}
          ref: ${{ inputs.scripts_ref }}
          path: _promote-scripts
          token: ${{ steps.auth.outputs.token }}

      # --- Version ---
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $v = '${{ inputs.version }}'
          if (-not $v) {
            $v = "$(Get-Date -Format 'yyyyMMdd').${{ github.run_number }}"
          }
          Write-Host "Version: $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      # --- Guard ---
      - name: Guard - skip if not changelog-related
        id: guard
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sha = '${{ inputs.trigger_sha }}'
          Write-Host "Checking commit: $sha"

          $changedFiles = git diff-tree --no-commit-id --name-only -r -m $sha
          if ($changedFiles -notcontains 'CHANGELOG.md') {
            Write-Host "Trigger commit did not modify CHANGELOG.md - skipping"
            "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $commitMsg = git log $sha -1 --format="%s"
          if ($commitMsg -match '^docs: promote changelog \[Unreleased\] to \[') {
            Write-Host "Commit is a changelog promotion - skipping to prevent loop"
            "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Guard passed - proceeding with promotion"
          "skip=false" >> $env:GITHUB_OUTPUT

      # --- Promote ---
      - name: Promote changelog
        if: steps.guard.outputs.skip != 'true'
        id: promote
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = '${{ steps.version.outputs.version }}'
          $sha = '${{ inputs.trigger_sha }}'
          $authMode = '${{ steps.auth.outputs.mode }}'

          git pull origin main

          # Extract PR title from commit message
          # GitHub squash-merge format: "title (#123)"
          $commitMsg = git log $sha -1 --format="%s"
          $prTitle = ""
          if ($commitMsg -match '^(.+)\s+\(#\d+\)$') {
            $prTitle = $Matches[1].Trim()
          }
          # GitHub merge commit: "Merge pull request #123 from branch"
          elseif ($commitMsg -match 'Merge pull request #?\d+ from .+') {
            $bodyLine = (git log $sha -1 --format="%b").Split("`n") |
              Where-Object { $_.Trim() } | Select-Object -First 1
            $prTitle = if ($bodyLine -and $bodyLine.Trim()) { $bodyLine.Trim() } else { "" }
          }
          # AzDO format for compatibility: "Merged PR 123: title"
          elseif ($commitMsg -match 'Merged PR \d+:\s*(.+)$') {
            $prTitle = $Matches[1].Trim()
          }

          Write-Host "PR title: '$prTitle'"

          & "./_promote-scripts/scripts/Promote-Changelog.ps1" `
            -ChangelogPath "./CHANGELOG.md" `
            -Version $version -PrTitle $prTitle
          if ($LASTEXITCODE -ne 0) { Write-Error "Promote-Changelog.ps1 failed ($LASTEXITCODE)" }

          $diff = git diff --name-only -- CHANGELOG.md
          if ([string]::IsNullOrWhiteSpace($diff)) {
            Write-Host "No promotion needed (empty [Unreleased] or already promoted)"
            "promoted=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          # Configure git identity based on auth mode
          if ($authMode -eq 'app') {
            # App token: use the App's bot identity
            git config --local user.email "changelog-promote-bot[bot]@users.noreply.github.com"
            git config --local user.name "changelog-promote-bot[bot]"
          } else {
            # PAT or GITHUB_TOKEN: use github-actions bot
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
          }

          git add CHANGELOG.md
          git commit -m "docs: promote changelog [Unreleased] to [$version] [skip ci]"
          git push origin main
          if ($LASTEXITCODE -ne 0) { Write-Error "Push to main failed. Check token permissions." }

          Write-Host "Promotion complete: [$version]"
          "promoted=true" >> $env:GITHUB_OUTPUT

      # --- Auto-resolve PR conflicts ---
      - name: Auto-resolve PR conflicts
        if: steps.guard.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $authMode = '${{ steps.auth.outputs.mode }}'

          # Git identity matches promote step
          if ($authMode -eq 'app') {
            git config --local user.email "changelog-promote-bot[bot]@users.noreply.github.com"
            git config --local user.name "changelog-promote-bot[bot]"
          } else {
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
          }

          git fetch origin main
          git checkout main
          git pull origin main

          $prsJson = gh pr list --base main --state open --json number,headRefName --limit 100
          $prs = $prsJson | ConvertFrom-Json

          if (-not $prs -or $prs.Count -eq 0) {
            Write-Host "No open PRs targeting main"
            exit 0
          }

          Write-Host "Checking $($prs.Count) open PR(s) for CHANGELOG.md conflicts"
          $resolved = 0; $skipped = 0

          foreach ($pr in $prs) {
            $prNum = $pr.number
            $srcBranch = $pr.headRefName

            if ($srcBranch -notmatch '^[a-zA-Z0-9._/\-]+$') {
              Write-Host "Skipping PR #$prNum - unsafe branch name: $srcBranch"
              $skipped++
              continue
            }

            Write-Host "`n--- PR #$prNum (branch: $srcBranch) ---"

            try {
              git fetch origin "refs/heads/${srcBranch}:refs/remotes/origin/${srcBranch}" 2>&1 | Out-Null
              if ($LASTEXITCODE -ne 0) {
                Write-Host "  Fetch failed for $srcBranch - skipping"
                $skipped++
                continue
              }

              $tempBranch = "auto-resolve/$prNum"
              git checkout -b $tempBranch "origin/$srcBranch" 2>&1 | Out-Null

              $mergeOutput = git merge origin/main --no-commit --no-ff 2>&1 | Out-String
              $mergeExitCode = $LASTEXITCODE

              if ($mergeExitCode -eq 0) {
                Write-Host "  No conflict with main - skipping"
                git merge --abort 2>&1 | Out-Null
                git checkout main 2>&1 | Out-Null
                git branch -D $tempBranch 2>&1 | Out-Null
                $skipped++
                continue
              }

              $conflictedFiles = @(git diff --name-only --diff-filter=U)

              if ($conflictedFiles.Count -eq 1 -and $conflictedFiles[0] -eq 'CHANGELOG.md') {
                Write-Host "  Only CHANGELOG.md is conflicted - attempting auto-resolve"

                & "./_promote-scripts/scripts/Resolve-ChangelogConflict.ps1" `
                  -ChangelogPath "./CHANGELOG.md"
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "  Resolve script failed - aborting"
                  git merge --abort 2>&1 | Out-Null
                  git checkout main 2>&1 | Out-Null
                  git branch -D $tempBranch 2>&1 | Out-Null
                  $skipped++
                  continue
                }

                git commit -m "chore: auto-resolve CHANGELOG.md merge conflict [skip ci]"
                git push origin "HEAD:refs/heads/$srcBranch"
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "  Push failed for PR #$prNum"
                  $skipped++
                } else {
                  Write-Host "  Successfully resolved conflict for PR #$prNum"
                  $resolved++
                }
              } else {
                Write-Host "  $($conflictedFiles.Count) file(s) conflicted - not safe to auto-resolve"
                Write-Host "  Conflicted: $($conflictedFiles -join ', ')"
                $skipped++
              }
            } catch {
              Write-Host "  Error processing PR #$prNum : $($_.Exception.Message)"
              $skipped++
            } finally {
              git merge --abort 2>&1 | Out-Null
              git checkout main 2>&1 | Out-Null
              git branch -D $tempBranch 2>&1 | Out-Null
            }
          }

          Write-Host "`nDone: $resolved resolved, $skipped skipped out of $($prs.Count) PR(s)"
