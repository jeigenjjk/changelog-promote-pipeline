name: Changelog Promote
on:
  workflow_call:
    inputs:
      trigger_sha:
        description: 'The commit SHA that landed on main'
        required: true
        type: string
    secrets:
      app_id:
        description: 'GitHub App ID for token generation'
        required: false
      app_private_key:
        description: 'GitHub App private key (PEM format)'
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check secrets via env
        id: check
        shell: bash
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_ID: ${{ secrets.app_id }}
          APP_KEY: ${{ secrets.app_private_key }}
      - name: Generate App token
        if: steps.check.outputs.has_app == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
      - name: Debug
        run: |
          echo "trigger_sha=${{ inputs.trigger_sha }}"
          echo "has_app=${{ steps.check.outputs.has_app }}"
          echo "app_token_set=${{ steps.app-token.outputs.token != '' }}"
