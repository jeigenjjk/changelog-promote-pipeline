name: Changelog Promote
on:
  workflow_call:
    inputs:
      trigger_sha:
        description: 'The commit SHA that landed on main'
        required: true
        type: string
    secrets:
      app_id:
        description: 'GitHub App ID for token generation'
        required: false
      app_private_key:
        description: 'GitHub App private key (PEM format)'
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Generate App token
        if: ${{ secrets.app_id != '' && secrets.app_private_key != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
      - name: Debug
        run: echo "Done"
