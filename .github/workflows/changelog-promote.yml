name: Changelog Promote
on:
  workflow_call:
    inputs:
      trigger_sha:
        description: 'The commit SHA that landed on main'
        required: true
        type: string
    secrets:
      app_id:
        description: 'GitHub App ID for token generation'
        required: false
      app_private_key:
        description: 'GitHub App private key (PEM format)'
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check secrets
        if: ${{ secrets.app_id != '' && secrets.app_private_key != '' }}
        run: echo "Secrets present"
      - name: Debug
        run: echo "trigger_sha=${{ inputs.trigger_sha }}"
